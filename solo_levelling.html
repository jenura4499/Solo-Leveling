<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solo Levelling — Productivity Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#04060f;width:100%;height:100%;overflow-x:hidden}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F0A500;--gold2:#ffcc44;--cyan:#00d4ff;--cyan2:#7fffff;
  --green:#00ff88;--red:#ff3355;--purple:#a855f7;
  --bg:#04060f;--bg2:#070d1c;--bg3:#0b1428;
}
body,*{font-family:'Arial Unicode MS','Aharoni',Arial,sans-serif}

.sl{
  background:var(--bg);
  width:100%;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
}

.screen{display:none;flex-direction:column;flex:1;padding:28px 36px;animation:screenIn 0.5s cubic-bezier(.4,0,.2,1)}
.screen.active{display:flex}
@keyframes screenIn{from{opacity:0;transform:scale(0.98)}to{opacity:1;transform:scale(1)}}

.hdr{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid rgba(0,212,255,0.15)}
.logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:3px;color:var(--gold)}
.logo em{color:var(--cyan);font-style:normal}
.meta{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(0,212,255,0.6);font-family:'Orbitron',monospace;letter-spacing:1px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;flex:1}
@media(max-width:600px){.fields-grid{grid-template-columns:1fr}}

.fl{opacity:0;transform:translateY(24px);transition:opacity 0.45s ease,transform 0.45s ease}
.fl.popped{opacity:1;transform:translateY(0)}
.fl label{display:block;font-size:14px;letter-spacing:2px;margin-bottom:7px;font-weight:700}
.fl .hint{font-size:11px;margin-top:4px;letter-spacing:1px;font-family:'Orbitron',monospace}
.lc{color:rgba(0,212,255,0.85)}
.lg{color:rgba(240,165,0,0.9)}
.lp{color:rgba(168,85,247,0.9)}
.lgr{color:rgba(0,255,136,0.8)}
.lr{color:rgba(255,51,85,0.85)}
.hc{color:rgba(0,212,255,0.4)}
.hg{color:rgba(240,165,0,0.4)}
.hp{color:rgba(168,85,247,0.4)}
.hgr{color:rgba(0,255,136,0.4)}

.fi{width:100%;border-radius:8px;padding:12px 14px;font-size:15px;font-weight:600;outline:none;transition:all 0.25s;letter-spacing:0.5px}
.fi::placeholder{opacity:0.3}
.fi.fc{background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.25);color:var(--cyan2)}
.fi.fc:focus{border-color:var(--cyan);background:rgba(0,212,255,0.13)}
.fi.fg{background:rgba(240,165,0,0.07);border:1px solid rgba(240,165,0,0.25);color:var(--gold2)}
.fi.fg:focus{border-color:var(--gold);background:rgba(240,165,0,0.13)}
.fi.fp{background:rgba(168,85,247,0.07);border:1px solid rgba(168,85,247,0.25);color:#c084fc}
.fi.fp:focus{border-color:var(--purple);background:rgba(168,85,247,0.13)}
textarea.fi{resize:vertical;min-height:74px}

input[type=number]{-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

.tog{display:flex;gap:8px;margin-top:5px}
.tb{flex:1;padding:11px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:2px;font-weight:700;transition:all 0.2s}
.tb.off{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3)}
.tb.ay{background:rgba(255,51,85,0.15);border:1px solid var(--red);color:var(--red)}
.tb.an{background:rgba(0,255,136,0.12);border:1px solid var(--green);color:var(--green)}

.sl-row{display:flex;align-items:center;gap:10px}

input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;background:transparent}
input[type=range].rc{background:rgba(0,212,255,0.2)}
input[type=range].rg{background:rgba(240,165,0,0.2)}
input[type=range].rr{background:rgba(255,51,85,0.2)}
input[type=range].rc::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg);cursor:pointer;box-shadow:0 0 8px rgba(0,212,255,0.5)}
input[type=range].rg::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);border:2px solid var(--bg);cursor:pointer;box-shadow:0 0 8px rgba(240,165,0,0.5)}
input[type=range].rr::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--red);border:2px solid var(--bg);cursor:pointer;box-shadow:0 0 8px rgba(255,51,85,0.5)}

.sbtn{padding:14px;border-radius:10px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all 0.3s;width:100%}
.sbtn.gold{background:rgba(240,165,0,0.1);border:1px solid var(--gold);color:var(--gold)}
.sbtn.gold:hover{background:rgba(240,165,0,0.22);color:var(--gold2);box-shadow:0 0 20px rgba(240,165,0,0.2)}
.sbtn.cyan{background:rgba(0,212,255,0.1);border:1px solid var(--cyan);color:var(--cyan);width:auto;padding:9px 22px;font-size:10px}
.sbtn.cyan:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 14px rgba(0,212,255,0.2)}
.sbtn.sm{padding:11px;margin-top:14px;font-size:10px;width:100%}

.ptitle{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.ptitle::after{content:'';flex:1;height:1px}
.ptitle.c{color:var(--cyan)}
.ptitle.c::after{background:linear-gradient(90deg,rgba(0,212,255,0.3),transparent)}
.ptitle.g{color:var(--gold)}
.ptitle.g::after{background:linear-gradient(90deg,rgba(240,165,0,0.3),transparent)}
.ptitle.p{color:var(--purple)}
.ptitle.p::after{background:linear-gradient(90deg,rgba(168,85,247,0.3),transparent)}

.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1}
@media(max-width:600px){.rep-grid{grid-template-columns:1fr}}

.rcard{background:var(--bg2);border-radius:14px;padding:22px;position:relative;overflow:hidden;opacity:0;transform:translateY(22px);transition:opacity 0.5s ease,transform 0.5s ease;border:1px solid transparent}
.rcard.popped{opacity:1;transform:translateY(0)}
.rcard.bc{border-color:rgba(0,212,255,0.15)}
.rcard.bg{border-color:rgba(240,165,0,0.15)}
.rcard.bp{border-color:rgba(168,85,247,0.15)}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.rcard.bc::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.55}
.rcard.bg::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.55}
.rcard.bp::before{background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:0.55}

.score-outer{display:flex;align-items:center;gap:22px}
.bar-row{margin-bottom:13px}
.bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.bn{color:rgba(255,255,255,0.68);font-weight:600;letter-spacing:0.5px}
.bv{font-family:'Orbitron',monospace;font-size:10px;color:rgba(255,255,255,0.35)}
.bar-bg{border-radius:4px;height:8px;overflow:hidden}
.bbc{background:rgba(0,212,255,0.1)}
.bbg{background:rgba(240,165,0,0.1)}
.bbp{background:rgba(168,85,247,0.1)}
.bbr{background:rgba(255,51,85,0.1)}
.bar-f{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.bf-g{background:var(--green);box-shadow:0 0 10px rgba(0,255,136,0.45)}
.bf-a{background:var(--gold);box-shadow:0 0 10px rgba(240,165,0,0.45)}
.bf-r{background:var(--red);box-shadow:0 0 10px rgba(255,51,85,0.45)}

.gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gauge{border-radius:10px;padding:16px 8px;text-align:center}
.gauge.c{background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2)}
.gauge.g{background:rgba(240,165,0,0.07);border:1px solid rgba(240,165,0,0.2)}
.gauge.r{background:rgba(255,51,85,0.07);border:1px solid rgba(255,51,85,0.2)}
.gv{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;margin-bottom:4px}
.gl{font-size:10px;letter-spacing:2px;opacity:0.45;font-family:'Orbitron',monospace}

.insight-box{background:rgba(168,85,247,0.07);border:1px solid rgba(168,85,247,0.2);border-radius:10px;padding:18px;line-height:1.85;font-size:14px;color:rgba(255,255,255,0.78)}
.ititle{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--purple);margin-bottom:10px}

.goal-card{background:rgba(240,165,0,0.06);border:1px solid rgba(240,165,0,0.18);border-radius:10px;padding:16px;margin-top:14px}
.gname{font-size:15px;font-weight:700;color:var(--gold2);margin-bottom:4px}
.gdead{font-size:11px;color:rgba(240,165,0,0.45);margin-bottom:12px;font-family:'Orbitron',monospace;letter-spacing:1px}

.badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.badge{font-size:11px;padding:5px 12px;border-radius:20px;font-family:'Orbitron',monospace;letter-spacing:1px;font-weight:700}
.bad-g{background:rgba(240,165,0,0.12);border:1px solid rgba(240,165,0,0.35);color:var(--gold)}
.bad-gr{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green)}
.bad-r{background:rgba(255,51,85,0.12);border:1px solid rgba(255,51,85,0.3);color:var(--red)}
.bad-c{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);color:var(--cyan)}
.bad-p{background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);color:var(--purple)}

.lvl-bar{display:flex;gap:4px;margin:8px 0 4px}
.lvl-seg{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.07)}
.lvl-seg.on-g{background:var(--gold);box-shadow:0 0 6px rgba(240,165,0,0.4)}
.lvl-seg.on-c{background:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,0.4)}
.lvl-seg.on-p{background:var(--purple);box-shadow:0 0 6px rgba(168,85,247,0.4)}

.note-box{background:rgba(0,212,255,0.04);border-left:2px solid rgba(0,212,255,0.3);border-radius:0 6px 6px 0;padding:12px 14px;font-size:13px;color:rgba(0,212,255,0.55);line-height:1.7;margin-top:14px}
</style>
</head>
<body>

<div class="sl">

  <!-- FORM SCREEN -->
  <div class="screen active" id="screen-form">
    <div class="hdr">
      <svg width="32" height="36" viewBox="0 0 30 34">
        <polygon points="15,1 27,8 27,26 15,33 3,26 3,8" fill="none" stroke="#F0A500" stroke-width="1.5"/>
        <polygon points="15,7 23,12 23,22 15,27 7,22 7,12" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
        <polygon points="15,12 20,15 20,19 15,22 10,19 10,15" fill="#F0A500"/>
      </svg>
      <div class="logo">SOLO <em>LEVELLING</em></div>
      <div class="meta"><div class="dot"></div><span id="sl-date"></span></div>
    </div>

    <div class="fields-grid" id="fields-grid">
      <div class="fl" id="f1">
        <label class="lc">STUDY HOURS</label>
        <input class="fi fc" type="number" id="f-study" min="0" max="16" step="0.5" placeholder="0.0"/>
        <div class="hint hc">TARGET: 5 HRS</div>
      </div>
      <div class="fl" id="f2">
        <label class="lg">EXERCISE MINUTES</label>
        <input class="fi fg" type="number" id="f-ex" min="0" max="300" step="5" placeholder="0"/>
        <div class="hint hg">TARGET: 120 MIN</div>
      </div>
      <div class="fl" id="f3">
        <label class="lp">LEARNING HOURS</label>
        <input class="fi fp" type="number" id="f-learn" min="0" max="12" step="0.5" placeholder="0.0"/>
        <div class="hint hp">TARGET: 3 HRS</div>
      </div>
      <div class="fl" id="f4">
        <label class="lc">SLEEP HOURS</label>
        <input class="fi fc" type="number" id="f-sleep" min="0" max="12" step="0.5" placeholder="0.0"/>
        <div class="hint hc">TARGET: 7–8 HRS</div>
      </div>
      <div class="fl" id="f5">
        <label class="lgr">JUNK FOOD TODAY?</label>
        <div class="tog">
          <button class="tb off" id="ty" onclick="setJ(true)">YES</button>
          <button class="tb an" id="tn" onclick="setJ(false)">NO</button>
        </div>
        <div class="hint hgr">TARGET: CLEAN DAY</div>
      </div>
      <div class="fl" id="f6">
        <label class="lp">NOTES</label>
        <textarea class="fi fp" id="f-notes" placeholder="Log today's observations..."></textarea>
      </div>
      <div class="fl" id="f7">
        <label class="lgr">MOOD &nbsp;<span style="color:var(--cyan);font-family:Orbitron,monospace;font-size:18px;font-weight:900" id="mv">5</span></label>
        <div class="sl-row" style="margin-bottom:16px">
          <span style="font-size:11px;color:rgba(255,255,255,.2)">1</span>
          <input type="range" class="rc" min="1" max="10" step="1" value="5" id="f-mood" oninput="document.getElementById('mv').textContent=this.value"/>
          <span style="font-size:11px;color:rgba(255,255,255,.2)">10</span>
        </div>
        <label class="lg">ENERGY &nbsp;<span style="color:var(--gold);font-family:Orbitron,monospace;font-size:18px;font-weight:900" id="ev">5</span></label>
        <div class="sl-row" style="margin-bottom:16px">
          <span style="font-size:11px;color:rgba(255,255,255,.2)">1</span>
          <input type="range" class="rg" min="1" max="10" step="1" value="5" id="f-energy" oninput="document.getElementById('ev').textContent=this.value"/>
          <span style="font-size:11px;color:rgba(255,255,255,.2)">10</span>
        </div>
        <label class="lr">STRESS &nbsp;<span style="color:var(--red);font-family:Orbitron,monospace;font-size:18px;font-weight:900" id="sv">5</span></label>
        <div class="sl-row">
          <span style="font-size:11px;color:rgba(255,255,255,.2)">1</span>
          <input type="range" class="rr" min="1" max="10" step="1" value="5" id="f-stress" oninput="document.getElementById('sv').textContent=this.value"/>
          <span style="font-size:11px;color:rgba(255,255,255,.2)">10</span>
        </div>
      </div>
      <div class="fl" id="f8" style="display:flex;flex-direction:column;justify-content:flex-end">
        <button class="sbtn gold" onclick="submitDay()">⚡ UPLOAD DAY LOG</button>
      </div>
    </div>
  </div>

  <!-- REPORT SCREEN -->
  <div class="screen" id="screen-report">
    <div class="hdr">
      <svg width="32" height="36" viewBox="0 0 30 34">
        <polygon points="15,1 27,8 27,26 15,33 3,26 3,8" fill="none" stroke="#F0A500" stroke-width="1.5"/>
        <polygon points="15,7 23,12 23,22 15,27 7,22 7,12" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
        <polygon points="15,12 20,15 20,19 15,22 10,19 10,15" fill="#F0A500"/>
      </svg>
      <div class="logo">SOLO <em>LEVELLING</em></div>
      <div class="meta"><div class="dot"></div><span id="rep-date"></span></div>
      <button class="sbtn cyan" style="margin-left:12px" onclick="goForm()">✏ EDIT LOG</button>
    </div>
    <div class="rep-grid" id="rep-grid"></div>
  </div>

</div>

<script>
var junk=false;
function setJ(v){
  junk=v;
  document.getElementById('ty').className='tb'+(v?' ay':' off');
  document.getElementById('tn').className='tb'+(v?' off':' an');
}
var today=new Date().toISOString().slice(0,10);
var dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
document.getElementById('sl-date').textContent=dateStr;
document.getElementById('rep-date').textContent=dateStr;

function getLogs(){try{return JSON.parse(localStorage.getItem('sl_v5')||'{}')}catch(e){return {}}}
function saveLogs(d){localStorage.setItem('sl_v5',JSON.stringify(d))}

function popFields(){
  ['f1','f2','f3','f4','f5','f6','f7','f8'].forEach(function(id,i){
    setTimeout(function(){var el=document.getElementById(id);if(el)el.classList.add('popped');},i*90);
  });
}
function popCards(){
  document.querySelectorAll('.rcard').forEach(function(el,i){
    setTimeout(function(){el.classList.add('popped');},i*130);
  });
}
function calcScore(d){
  var s=Math.min(d.study/5,1)*35,e=Math.min(d.ex/120,1)*20,l=Math.min(d.learn/3,1)*15;
  var sp=(d.sleep>=7&&d.sleep<=8)?1:(d.sleep>=6)?0.7:0.4;
  return Math.round(s+e+l+sp*20+(d.junk?0:10));
}
function getStreak(){
  var logs=getLogs(),n=0;
  for(var i=0;i<365;i++){var k=new Date(Date.now()-i*864e5).toISOString().slice(0,10);if(logs[k]&&logs[k].score>=75)n++;else break;}
  return n;
}
function getGoalProg(){
  var logs=getLogs(),c=0;
  Object.values(logs).forEach(function(e){if(e.score>=75)c++;});
  return Math.min(c,100);
}
function insight(d,sc){
  var m=[];
  if(sc>=90)m.push("Elite execution. Every metric is firing — your exam outcome is being decided by days like today.");
  else if(sc>=75)m.push("Strong day logged. Consistency at this level creates compound cognitive growth over 90 days.");
  if(d.study<3&&sc<85)m.push("Study hours are below the critical threshold. Schedule a focused AM block before distractions arise tomorrow.");
  if(d.junk)m.push("Junk food consumed. Processed inputs impair memory consolidation during REM — go clean tomorrow.");
  if(d.mood<5&&d.stress>7)m.push("High stress and low mood detected. 10 minutes of breathwork before sleep will reset your cortisol baseline.");
  if(d.sleep<6)m.push("Under 6 hours: cognitive output drops 20%. Sleep is your #1 performance lever tonight.");
  if(d.ex<30)m.push("Minimal movement detected. Even a 20-minute walk releases BDNF — your brain's growth hormone.");
  if(m.length===0)m.push("All systems nominal. You are executing the compounding strategy. Stay disciplined.");
  return m.slice(0,2).join(' ');
}
function lvlData(sc){
  if(sc>=90)return{lbl:'MASTER',cls:'bad-g',n:5,s:'on-g'};
  if(sc>=80)return{lbl:'HIGH PERFORMER',cls:'bad-gr',n:4,s:'on-c'};
  if(sc>=70)return{lbl:'PRODUCTIVE',cls:'bad-c',n:3,s:'on-c'};
  if(sc>=55)return{lbl:'CONSISTENT',cls:'bad-p',n:2,s:'on-p'};
  return{lbl:'BEGINNER',cls:'bad-r',n:1,s:'on-p'};
}
function ring(sc,col){
  var r=56,cx=74,cy=74,c=2*Math.PI*r,fill=Math.round(sc/100*c);
  return '<svg width="148" height="148" viewBox="0 0 148 148" style="flex-shrink:0;filter:drop-shadow(0 0 16px '+col+'55)">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+fill+' '+c+'" stroke-dashoffset="'+c/4+'" style="transition:stroke-dasharray 1.3s ease"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="42" fill="#04060f" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>'+
    '<text x="'+cx+'" y="'+(cy+9)+'" text-anchor="middle" font-family="Orbitron,monospace" font-size="32" font-weight="900" fill="'+col+'">'+sc+'</text>'+
    '<text x="'+cx+'" y="'+(cy+24)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="2">/ 100</text>'+
  '</svg>';
}
function bar(name,val,goal,unit,bgc,isClean){
  var pct=Math.min(val/goal,1),w=Math.round(pct*100);
  var cl=pct>=1?'bf-g':pct>=0.6?'bf-a':'bf-r';
  var lbl=isClean!==undefined?(isClean?'ACHIEVED':'FAILED'):(val+' / '+goal+' '+unit);
  return '<div class="bar-row">'+
    '<div class="bar-top"><span class="bn">'+name+'</span><span class="bv">'+lbl+'</span></div>'+
    '<div class="bar-bg '+bgc+'"><div class="bar-f '+cl+'" data-w="'+w+'" style="width:0%"></div></div>'+
  '</div>';
}
function buildReport(d){
  var sc=d.score,col=sc>=75?'#00ff88':sc>=50?'#F0A500':'#ff3355';
  var streak=getStreak(),gp=getGoalProg();
  var dl=new Date(); dl.setMonth(dl.getMonth()+3);
  var days=Math.ceil((dl-new Date())/864e5);
  var lv=lvlData(sc);
  var segs=''; for(var i=0;i<5;i++)segs+='<div class="lvl-seg'+(i<lv.n?' '+lv.s:'')+'"></div>';
  var badges='';
  if(sc>=90)badges+='<span class="badge bad-g">⭐ TOP PERFORMER</span>';
  if(d.study>=5&&d.ex>=120&&d.learn>=3&&d.sleep>=7&&!d.junk)badges+='<span class="badge bad-gr">🏆 PERFECT DAY</span>';
  if(streak>=7)badges+='<span class="badge bad-r">🔥 7-DAY WARRIOR</span>';
  if(streak>=3)badges+='<span class="badge bad-c">⚡ ON STREAK</span>';
  if(sc>=75)badges+='<span class="badge bad-p">🛡 THRESHOLD HIT</span>';

  document.getElementById('rep-grid').innerHTML=
    '<div class="rcard bc">'+
      '<div class="ptitle g">📡 PERFORMANCE SCORE</div>'+
      '<div class="score-outer">'+ring(sc,col)+
        '<div style="flex:1">'+
          '<div style="font-family:Orbitron,monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:6px">PLAYER CLASS</div>'+
          '<span class="badge '+lv.cls+'" style="display:inline-block;margin-bottom:10px">'+lv.lbl+'</span>'+
          '<div class="lvl-bar">'+segs+'</div>'+
          '<div style="font-size:12px;color:rgba(255,255,255,0.35);font-family:Orbitron,monospace;letter-spacing:1px;margin-top:4px">'+streak+' DAY STREAK</div>'+
          (badges?'<div class="badges">'+badges+'</div>':'')+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div class="rcard bp">'+
      '<div class="ptitle p">⚡ BIOMETRIC STATUS</div>'+
      '<div class="gauges">'+
        '<div class="gauge c"><div class="gv" style="color:var(--cyan)">'+d.mood+'</div><div class="gl">MOOD</div></div>'+
        '<div class="gauge g"><div class="gv" style="color:var(--gold)">'+d.energy+'</div><div class="gl">ENERGY</div></div>'+
        '<div class="gauge r"><div class="gv" style="color:var(--red)">'+d.stress+'</div><div class="gl">STRESS</div></div>'+
      '</div>'+
      '<div class="goal-card">'+
        '<div class="gname">Good Mark — Next Unit Exam</div>'+
        '<div class="gdead">⏱ '+days+' DAYS REMAINING</div>'+
        '<div class="bar-bg bbg" style="height:9px;margin-bottom:6px"><div class="bar-f bf-g" data-w="'+gp+'" style="width:0%"></div></div>'+
        '<div style="font-size:11px;color:rgba(240,165,0,0.45);font-family:Orbitron,monospace;letter-spacing:1px">'+gp+'% MISSION PROGRESS</div>'+
      '</div>'+
    '</div>'+

    '<div class="rcard bg">'+
      '<div class="ptitle c">🎯 GOAL COMPLETION</div>'+
      bar('Study',d.study,5,'hrs','bbc')+
      bar('Exercise',d.ex,120,'min','bbg')+
      bar('Learning',d.learn,3,'hrs','bbp')+
      bar('Sleep',d.sleep,8,'hrs','bbc')+
      bar('Clean Eating',d.junk?0:1,1,'','bbr',!d.junk)+
    '</div>'+

    '<div class="rcard bp">'+
      '<div class="ptitle p">🧠 AI ANALYSIS</div>'+
      '<div class="insight-box"><div class="ititle">✦ SYSTEM INSIGHT</div>'+insight(d,sc)+'</div>'+
      (d.notes?'<div class="note-box">📝 '+d.notes+'</div>':'')+
      '<button class="sbtn cyan sm" onclick="resetToday()">↺ RESET &amp; RE-LOG</button>'+
    '</div>';
}
function goReport(d){
  document.getElementById('screen-form').classList.remove('active');
  document.getElementById('screen-report').classList.add('active');
  buildReport(d);
  setTimeout(function(){
    popCards();
    setTimeout(function(){
      document.querySelectorAll('.bar-f[data-w]').forEach(function(el){el.style.width=el.getAttribute('data-w')+'%';});
    },450);
  },80);
}
function goForm(){
  document.getElementById('screen-report').classList.remove('active');
  document.getElementById('screen-form').classList.add('active');
  setTimeout(popFields,80);
}
function submitDay(){
  var d={
    study:parseFloat(document.getElementById('f-study').value)||0,
    ex:parseFloat(document.getElementById('f-ex').value)||0,
    learn:parseFloat(document.getElementById('f-learn').value)||0,
    sleep:parseFloat(document.getElementById('f-sleep').value)||0,
    junk:junk,
    mood:parseInt(document.getElementById('f-mood').value),
    energy:parseInt(document.getElementById('f-energy').value),
    stress:parseInt(document.getElementById('f-stress').value),
    notes:document.getElementById('f-notes').value
  };
  d.score=calcScore(d);
  var logs=getLogs(); logs[today]=d; saveLogs(logs);
  goReport(d);
}
function resetToday(){
  var logs=getLogs(); delete logs[today]; saveLogs(logs);
  goForm();
}
(function init(){
  var logs=getLogs();
  if(logs[today]){
    var d=logs[today];
    document.getElementById('f-study').value=d.study;
    document.getElementById('f-ex').value=d.ex;
    document.getElementById('f-learn').value=d.learn;
    document.getElementById('f-sleep').value=d.sleep;
    document.getElementById('f-mood').value=d.mood;
    document.getElementById('f-energy').value=d.energy;
    document.getElementById('f-stress').value=d.stress;
    document.getElementById('f-notes').value=d.notes||'';
    document.getElementById('mv').textContent=d.mood;
    document.getElementById('ev').textContent=d.energy;
    document.getElementById('sv').textContent=d.stress;
    setJ(d.junk);
    goReport(d);
  } else {
    setTimeout(popFields,200);
  }
})();
</script>
</body>
</html>
